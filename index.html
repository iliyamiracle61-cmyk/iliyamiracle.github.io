<!DOCTYPE html>
<html>
<head>
    <title>ILIYA MIRACLE</title>

    <!-- Mobile Friendly -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: #f9fafb;
            scroll-behavior: smooth;
        }

        /* NAVBAR */
        nav {
            background: #1e3a8a;
            padding: 15px;
            position: sticky;
            top: 0;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* HEADER */
        header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(to right, #1e3a8a, #3b82f6);
            color: white;
        }

        /* SECTIONS */
        section {
            padding: 20px;
        }

        /* CARDS */
        .card {
            background: white;
            padding: 20px;
            margin: 15px auto;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* HOVER ANIMATION */
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .profile {
            width: 200px;
            border-radius: 50%;
            margin-top: 15px;
            border: 3px solid white;
            height: 200px;
            object-fit: cover;
        }
        #popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

#popup img {
    width: 80%;
    max-width: 400px;
    border-radius: 10px;
}
        /* BUTTON */
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 10px;
        }

        .btn:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>
</nav>

<!-- HEADER -->
<header>
    <h1>ILIYA MIRACLE</h1>
    <img src="https://i.imgur.com/Rr8Zikl.jpeg" class="profile" onclick="openImage()">

<div id="popup" onclick="closeImage()">
    <img src="https://i.imgur.com/Rr8Zikl.jpeg">
</div>
    <p>Student | Developer</p>
</header>

<!-- ABOUT -->
<section id="about">
    <div class="card">
        <h2>About Me</h2>
        <p>I am a passionate student learning web development a,nd programming.</p>
    </div>
</section>

<!-- SKILLS -->
<section id="skills">
    <div class="card">
        <h2>Skills</h2>
        <ul>
    <li>HTML</li>
    <li>CSS</li>
    <li>Python</li>
    <li>JavaScript</li>
</ul>
    </div>
</section>
<section id="projects">
    <div class="card">
        <h2>Projects</h2>
        <p>Personal Website</p>
        <p>More coming soon...</p>
    </div>
</section>
<!-- CONTACT -->
<section id="contact">
    <div class="card">
        <h2>Contact</h2>
        <p>Email: iliyamiracle61@gmail.com</p>
        <a href="#" class="btn">Message Me</a>
    </div>
</section>
<script>
function openImage() {
    document.getElementById("popup").style.display = "flex";
}

function closeImage() {
    document.getElementById("popup").style.display = "none";
}
</script>
</body>
</html>
